<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Invoice - Dipakai Berdua</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- TIRAI LOADING (Menutupi proses pembuatan PDF) -->
    <div id="loading-overlay">
        <div class="spinner"></div>
        <h3>Generating your PDF...</h3>
        <p>Please wait a moment</p>
    </div>

    <!-- WADAH PREVIEW PDF (Diletakkan di atas, tertutup tirai loading) -->
    <div id="invoice-preview-container">
        <div id="invoice-preview"></div>
    </div>

    <!-- MAIN UI APLIKASI -->
    <div class="app-container" id="input-ui">
        <header class="app-header">
            <div class="main-logo-container">
                <!-- Pastikan nama file logo benar -->
                <img src="Logo_Dipakaiberuda.png" alt="Dipakai Berdua Logo" class="app-brand-logo">
            </div>
            <h2>Invoice Builder</h2>
        </header>

        <div class="input-card">
            <div class="input-group">
                <label>Invoice Number</label>
                <input type="text" id="in-no" value="INV/2026/001">
            </div>
            <div class="input-group">
                <label>Date</label>
                <input type="date" id="in-date">
            </div>
        </div>

        <div class="input-card">
            <label class="section-label">Billed To:</label>
            <div class="input-group">
                <label>Client / Company Name</label>
                <input type="text" id="in-client-name" placeholder="e.g. Acme Corp">
            </div>
            <div class="input-group">
                <label>Address</label>
                <textarea id="in-client-address" placeholder="Client's full address..." rows="3"></textarea>
            </div>
        </div>

        <div class="items-section">
            <label class="section-label">Service Details:</label>
            <div id="items-list"></div>
            <button class="btn-add-item" onclick="addNewItem()">+ Add Work Item</button>
        </div>

        <div class="input-card">
            <div class="input-group">
                <label>Tax (%)</label>
                <input type="number" id="in-tax" value="0" placeholder="0">
            </div>
        </div>

        <div class="input-card">
            <label class="section-label">Payment Information:</label>
            <div class="input-group">
                <label>Account Name</label>
                <input type="text" id="in-acc-name" placeholder="Beneficiary name">
            </div>
            <div class="input-group">
                <label>Bank Name</label>
                <div class="select-wrapper">
                    <select id="in-bank">
                        <option value="" disabled selected>Select Bank...</option>
                        <option value="BCA">BCA</option>
                        <option value="Bank Mandiri">Bank Mandiri</option>
                        <option value="BNI">BNI</option>
                        <option value="BRI">BRI</option>
                        <option value="BSI">BSI (Bank Syariah Indonesia)</option>
                        <option value="Bank Jago">Bank Jago</option>
                        <option value="CIMB Niaga">CIMB Niaga</option>
                        <option value="Jenius">Jenius (BTPN)</option>
                        <option value="Other">Other...</option>
                    </select>
                </div>
            </div>
            <div class="input-group">
                <label>Account Number</label>
                <input type="number" id="in-acc-number" placeholder="Enter account number">
            </div>
            
            <div class="divider"></div>
            
            <div class="checkbox-group">
                <input type="checkbox" id="in-is-paid">
                <label for="in-is-paid">Mark as PAID</label>
            </div>
        </div>

        <div class="input-card">
            <label class="section-label">Additional Notes (Optional):</label>
            <div class="input-group">
                <textarea id="in-notes" placeholder="Thank you for your business..." rows="2"></textarea>
            </div>
        </div>

        <button class="btn-generate" id="btn-submit" onclick="generateAndDownload()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
            Download
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
